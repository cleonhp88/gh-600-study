site_name: GH-600 Study — Agentic AI Developer
site_description: Lộ trình học chứng chỉ GitHub Certified Agentic AI Developer (GH-600 beta)
site_author: cleonhp88
site_url: https://cleonhp88.github.io/gh-600-study/

repo_name: cleonhp88/gh-600-study
repo_url: https://github.com/cleonhp88/gh-600-study
edit_uri: edit/main/docs/

theme:
  name: material
  language: vi
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Chuyển sang dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Chuyển sang light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

plugins:
  - search:
      lang:
        - vi
        - en
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde

nav:
  - Trang chủ: index.md
  - 🎓 Học:
      - Foundations:
          - 1.1 Agent vs Script: learn/01-foundations/01-agent-vs-script.md
  - 📚 Tham khảo:
      - Day 2 (long-form, cũ): domains/01-architecture-sdlc/lesson-01-agents-in-sdlc.md
      - Baseline quiz (optional): day-01-baseline.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cleonhp88
  generator: false

copyright: |
  Personal study notes — GH-600 (beta) preparation
